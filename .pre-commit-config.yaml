repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - aiogram>=3.28.2
          - aiosqlite>=0.20
          - python-dotenv>=1.0
        args: [--config-file=pyproject.toml, bot]
