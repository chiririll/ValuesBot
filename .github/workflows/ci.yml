name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff (lint)
        run: uv run ruff check bot tests

      - name: Ruff (format check)
        run: uv run ruff format --check bot tests

      - name: Mypy
        run: uv run mypy bot

      - name: Pytest
        run: uv run pytest --cov=bot --cov-report=term-missing
